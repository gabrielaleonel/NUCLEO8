name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-core:
    name: Core C
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run C Tests
        run: |
          cd build
          ctest --output-on-failure

  build-app:
    name: C# App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Native Core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build build --config Release

      - name: Restore
        run: dotnet restore app/ChipSharp.sln

      - name: Build
        run: dotnet build app/ChipSharp.sln --configuration Release --no-restore

      - name: Deploy Native Library
        shell: bash
        run: |
          DEST="app/ChipSharp.Tests/bin/Release/net8.0"
          mkdir -p "$DEST"
          if [ "${{ runner.os }}" = "Windows" ]; then
            find build -name "chip8.dll" -exec cp {} "$DEST/" \;
          else
            find build -name "libchip8.so" -exec cp {} "$DEST/" \;
          fi

      - name: Run C# Tests
        run: dotnet test app/ChipSharp.sln --configuration Release --no-build --verbosity normal
