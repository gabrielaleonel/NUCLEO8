name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-core:
    name: Core C (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run C Tests
        run: |
          cd build
          ctest --output-on-failure --config Release

  build-app:
    name: C# App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-core
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore app/ChipSharp.sln

      - name: Build
        run: dotnet build app/ChipSharp.sln --configuration Release --no-restore

      - name: Run C# Tests
        run: dotnet test app/ChipSharp.sln --configuration Release --no-build --verbosity normal
